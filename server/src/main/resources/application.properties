server.port=${PORT:8080}

# Database Connection (Supabase Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.zcvdsiqakgulqgakgcbs.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:amanprajapati}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# SMTP Mail Settings
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio Settings
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone=${TWILIO_PHONE:}

# Custom Application Configs
app.jwt.secret=${JWT_SECRET:dev_only_jwt_secret_key_that_is_long_enough_to_be_secure_minimum_256_bits_abcdef}
app.client.url=${CLIENT_URL:http://localhost:5173}
app.enable-local-whatsapp=${ENABLE_LOCAL_WHATSAPP:false}

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Contact inquiry email configuration
app.contact.inquiry-email=${CONTACT_INQUIRY_EMAIL:info@smartqueue.com}
